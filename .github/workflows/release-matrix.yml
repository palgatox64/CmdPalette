name: Release Matrix

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing tag to publish (example: v1.0.0). Leave empty on tag push.'
        required: false
        type: string
      publish_github_release:
        description: 'Create/update GitHub release and upload JARs'
        required: true
        default: true
        type: boolean
      publish_modrinth:
        description: 'Publish versions to Modrinth'
        required: true
        default: false
        type: boolean
      version_type:
        description: 'Modrinth version type'
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            if [ -n "${{ inputs.release_tag }}" ]; then
              echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            else
              echo "release_tag=" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Load build matrix from file
        id: matrix
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          targets = json.loads(Path('.github/release-targets.json').read_text(encoding='utf-8'))
          if not isinstance(targets, list) or len(targets) == 0:
              raise SystemExit('release-targets.json must contain at least one target object')
          print(f"matrix={json.dumps(targets, separators=(',', ':'))}")
          PY

  create_release:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ (github.event_name == 'push' || inputs.publish_github_release) && needs.prepare.outputs.release_tag != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.release_tag }}
        shell: bash
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "CmdPalette ${TAG}" --notes-file CHANGELOG.MD

  build_publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
    if: ${{ needs.prepare.outputs.release_tag != '' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.target.java }}

      - name: Apply target versions to gradle.properties
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('gradle.properties')
          text = path.read_text(encoding='utf-8')
          replacements = {
            'minecraft_version': '${{ matrix.target.minecraft_version }}',
            'yarn_mappings': '${{ matrix.target.yarn_mappings }}',
            'loader_version': '${{ matrix.target.loader_version }}',
            'fabric_version': '${{ matrix.target.fabric_version }}'
          }

          lines = text.splitlines()
          out = []
          for line in lines:
            stripped = line.strip()
            replaced = False
            for key, value in replacements.items():
              if stripped.startswith(f'{key}='):
                prefix = line[:len(line) - len(line.lstrip())]
                out.append(f'{prefix}{key}={value}')
                replaced = True
                break
            if not replaced:
              out.append(line)

          path.write_text('\n'.join(out) + '\n', encoding='utf-8')
          PY

      - name: Ensure Gradle wrapper is executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Build
        shell: bash
        run: ./gradlew build

      - name: Resolve artifact path
        id: artifact
        shell: bash
        run: |
          JAR=$(ls -1 build/libs/*-mc${{ matrix.target.minecraft_version }}-fabric${{ matrix.target.loader_version }}.jar | head -n1)
          if [ ! -f "$JAR" ]; then
            echo "Artifact not found for target ${{ matrix.target.minecraft_version }}"
            ls -la build/libs
            exit 1
          fi
          echo "jar_path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: cmdpalette-mc${{ matrix.target.minecraft_version }}-fabric${{ matrix.target.loader_version }}
          path: ${{ steps.artifact.outputs.jar_path }}

      - name: Upload asset to GitHub release
        if: ${{ github.event_name == 'push' || inputs.publish_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.release_tag }}
        shell: bash
        run: |
          gh release upload "$TAG" "${{ steps.artifact.outputs.jar_path }}" --clobber

      - name: Publish to Modrinth
        if: ${{ inputs.publish_modrinth }}
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          VERSION_TYPE: ${{ inputs.version_type }}
          MINECRAFT_VERSION: ${{ matrix.target.minecraft_version }}
          ARTIFACT_PATH: ${{ steps.artifact.outputs.jar_path }}
        shell: bash
        run: |
          if [ -z "$MODRINTH_TOKEN" ]; then
            echo "Missing secret MODRINTH_TOKEN"
            exit 1
          fi
          if [ -z "$MODRINTH_PROJECT_ID" ]; then
            echo "Missing repository variable MODRINTH_PROJECT_ID (example: cmdpalette)"
            exit 1
          fi

          VERSION_NUMBER="${RELEASE_TAG#v}+mc${MINECRAFT_VERSION}"
          CHANGELOG_CONTENT=$(cat CHANGELOG.MD)

          EXISTING=$(curl --silent --show-error \
            -H "Authorization: $MODRINTH_TOKEN" \
            "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}/version")

          if echo "$EXISTING" | jq -e --arg version_number "$VERSION_NUMBER" '.[] | select(.version_number == $version_number)' >/dev/null; then
            echo "Modrinth version already exists ($VERSION_NUMBER). Skipping publish."
            exit 0
          fi

          if echo "$EXISTING" | jq -e --arg game_version "$MINECRAFT_VERSION" '.[] | select((.game_versions // []) | index($game_version))' >/dev/null; then
            echo "A Modrinth entry for Minecraft ${MINECRAFT_VERSION} already exists. Skipping publish to avoid duplicate Minecraft versions."
            exit 0
          fi

          JSON_DATA=$(jq -nc \
            --arg project_id "$MODRINTH_PROJECT_ID" \
            --arg version_number "$VERSION_NUMBER" \
            --arg name "CmdPalette $VERSION_NUMBER" \
            --arg changelog "$CHANGELOG_CONTENT" \
            --arg version_type "$VERSION_TYPE" \
            --arg game_version "$MINECRAFT_VERSION" \
            '{
              project_id: $project_id,
              version_number: $version_number,
              name: $name,
              changelog: $changelog,
              version_type: $version_type,
              loaders: ["fabric"],
              game_versions: [$game_version],
              featured: false,
              dependencies: [],
              file_parts: ["file"]
            }')

          curl --fail-with-body \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=$JSON_DATA" \
            -F "file=@$ARTIFACT_PATH" \
            https://api.modrinth.com/v2/version
